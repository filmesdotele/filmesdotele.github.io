<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" id="meta-description" content="Mais de 5.000 filmes dublados para assistir gratuitamente no Telegram. Busque seu filme favorito e acesse o link direto.">
<meta name="keywords" content="filmes dublados, filmes telegram, filmes gratis, filmes online, dublado português">
<meta property="og:title" content="Filmes Dublados — +5.000 filmes no Telegram">
<meta property="og:description" content="Acesse mais de 5.000 filmes dublados gratuitamente pelo Telegram.">
<title>Filmes Dublados — +5.000 filmes no Telegram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #161922;
    --border:    #252933;
    --accent:    #e63946;
    --accent2:   #ff6b6b;
    --text:      #f0f2f5;
    --muted:     #8892a4;
    --card-bg:   #1a1e2a;
    --card-hover:#1f2436;
    --radius:    10px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(160deg, #0d0f14 0%, #1a0a0e 50%, #0d0f14 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 200px;
    background: radial-gradient(ellipse, rgba(230,57,70,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-icon { font-size: 3rem; margin-bottom: 12px; display: block; }
  .hero h1 {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto 24px;
    line-height: 1.6;
  }
  .badge {
    display: inline-block;
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.3);
    color: var(--accent2);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  /* ── BUSCA ── */
  .search-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 24px 0;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 16px;
    color: var(--muted);
    font-size: 1.1rem;
    pointer-events: none;
  }
  #busca {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 14px 46px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #busca:focus { border-color: var(--accent); }
  #busca::placeholder { color: var(--muted); }
  #contador {
    text-align: right;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 8px;
  }
  #contador span { color: var(--accent2); font-weight: 600; }

  /* ── LISTA ── */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }
  #lista {
    display: grid;
    gap: 10px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: rgba(230,57,70,0.4);
    transform: translateX(2px);
  }
  .card-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .card-num {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 500;
    min-width: 32px;
    text-align: right;
    flex-shrink: 0;
  }
  .card-icon {
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 0.95rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-arrow {
    color: var(--accent);
    font-size: 1rem;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .card:hover .card-arrow { opacity: 1; }

  /* ── VAZIO ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: none;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty p { font-size: 0.95rem; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent2); text-decoration: none; }

  @media (max-width: 480px) {
    .hero { padding: 36px 16px 28px; }
    .search-wrap, .container { padding-left: 16px; padding-right: 16px; }
    .card-num { display: none; }
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <span class="hero-icon">🎬</span>
  <h1>Filmes <span>Dublados</span><br>no Telegram</h1>
  <p>Mais de <span id="hero-count">5.000</span> filmes dublados gratuitos. Busque, clique e assista pelo Telegram.</p>
  <span class="badge">✦ <span id="badge-count">5.684</span> filmes disponíveis</span>
</section>

<!-- BUSCA -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="search" id="busca" placeholder="Buscar filme... ex: Sonic, Deadpool, Avatar" autocomplete="off" autofocus>
  </div>
  <div id="contador">Mostrando <span id="total">5,684</span> filmes</div>
</div>

<!-- LISTA -->
<div class="container">
  <div id="lista"></div>
  <div class="empty" id="empty">
    <div class="empty-icon">🎞️</div>
    <p>Nenhum filme encontrado.<br>Tente outro título.</p>
  </div>
</div>

<footer>
  Filmes Dublados Brasil &nbsp;·&nbsp;
  <a href="https://t.me/Filmes_Dublados_Brasil" target="_blank">Canal no Telegram</a>
</footer>

<script>
// ─── Funções de contagem dinâmica ───────────────────────────────
function getCountLabel(n) {
  // Arredonda para baixo ao múltiplo de 500 mais próximo
  const base = Math.floor(n / 500) * 500;
  return base.toLocaleString('pt-BR');
}

// ─── Paginação virtual ────────────────────────────────────────────
const POR_PAG = 100;
let FILMES    = [];
let filtrados = [];
let pagina    = 0;
let carregando = false;

const lista = document.getElementById('lista');
const empty = document.getElementById('empty');
const total = document.getElementById('total');
const busca = document.getElementById('busca');

function normalizar(str) {
  return str.toLowerCase()
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ');
}

function renderCards(itens, inicio, fim) {
  const frag = document.createDocumentFragment();
  for (let i = inicio; i < Math.min(fim, itens.length); i++) {
    const f = itens[i];
    const a = document.createElement('a');
    a.className = 'card';
    a.href = f.l;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="card-left">
        <span class="card-num">${i+1}</span>
        <span class="card-icon">🎬</span>
        <span class="card-title">${f.t}</span>
      </div>
      <span class="card-arrow">→</span>
    `;
    frag.appendChild(a);
  }
  lista.appendChild(frag);
}

function resetLista(itens) {
  lista.innerHTML = '';
  pagina = 0;
  filtrados = itens;
  total.textContent = itens.length.toLocaleString('pt-BR');
  empty.style.display = itens.length === 0 ? 'block' : 'none';
  renderCards(itens, 0, POR_PAG);
  pagina = 1;
}

// Busca com debounce
let timer;
busca.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    const q = normalizar(busca.value.trim());
    if (!q) {
      resetLista(FILMES);
      return;
    }
    const termos = q.split(/\s+/);
    const res = FILMES.filter(f => {
      const nt = normalizar(f.t);
      return termos.every(t => nt.includes(t));
    });
    resetLista(res);
  }, 200);
});

// Scroll infinito
window.addEventListener('scroll', () => {
  if (carregando) return;
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
    carregando = true;
    const inicio = pagina * POR_PAG;
    if (inicio < filtrados.length) {
      renderCards(filtrados, inicio, inicio + POR_PAG);
      pagina++;
    }
    carregando = false;
  }
});

// ─── Carrega filmes.json dinamicamente ───────────────────────────
fetch('filmes.json')
  .then(r => {
    if (!r.ok) throw new Error('filmes.json não encontrado');
    return r.json();
  })
  .then(dados => {
    FILMES = dados;

    // Atualiza contagem no hero e badge
    const n = FILMES.length;
    const label = getCountLabel(n);

    const heroCount = document.getElementById('hero-count');
    const badgeCount = document.getElementById('badge-count');
    if (heroCount) heroCount.textContent = label;
    if (badgeCount) badgeCount.textContent = n.toLocaleString('pt-BR');

    // Atualiza meta description
    const metaDesc = document.getElementById('meta-description');
    if (metaDesc) {
      metaDesc.content = `Mais de ${label} filmes dublados para assistir gratuitamente no Telegram. Busque seu filme favorito e acesse o link direto.`;
    }

    resetLista(FILMES);
  })
  .catch(err => {
    console.error('Erro ao carregar filmes.json:', err);
    lista.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Erro ao carregar a lista de filmes.</p>';
  });
</script>
</body>
</html>
